services:
  postgres:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  rabbitmq:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  jaeger:
    restart: unless-stopped

  prometheus:
    restart: unless-stopped

  loki:
    restart: unless-stopped

  alloy:
    restart: unless-stopped

  grafana:
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    restart: unless-stopped

  api:
    env_file: .env.prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  worker:
    env_file: .env.prod
    environment:
      PAYMENT_WEBHOOK_URL: ${PAYMENT_WEBHOOK_URL:-http://api:3000/webhooks/payment}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
