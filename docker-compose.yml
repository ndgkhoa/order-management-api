# Local full stack. Two ways to run:
#   Dev (fast):  docker compose up -d postgres rabbitmq mailpit jaeger prometheus grafana
#                then on host: npm run dev  +  npm run dev:worker
#   Prod-like:   docker compose up --build   (also builds api + email-worker images)
#
# UIs: RabbitMQ :15672 · Mailpit :8025 · Jaeger :16686 · Grafana :3001 · Prometheus :9090
#
# Secrets policy (senior-pragmatic):
#   - DB/RabbitMQ creds here are LOCAL-DEV throwaways — fine to commit, never reused in prod.
#   - The only real secret, JWT_SECRET, is REQUIRED from the git-ignored `.env` (${JWT_SECRET:?})
#     and is never baked into the image.
#   - In production, creds come from a secrets manager / platform env (see docs/deployment-guide.md),
#     never from a committed file.

# api + email-worker load config from `.env` via `env_file:`, then override the few values
# that must use compose service-name hosts instead of localhost (.env targets host `npm run dev`).

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app # local-dev throwaway
      POSTGRES_PASSWORD: app
      POSTGRES_DB: orders
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d orders']
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management # default guest/guest (local only)
    ports: ['5672:5672', '15672:15672']
    volumes: ['rabbitmq-data:/var/lib/rabbitmq']
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit
    ports: ['1025:1025', '8025:8025']

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    tmpfs: ['/tmp']
    ports: ['16686:16686', '4318:4318'] # UI · OTLP HTTP

  prometheus:
    image: prom/prometheus
    volumes:
      - './prometheus.yml:/etc/prometheus/prometheus.yml:ro'
      - 'prometheus-data:/prometheus'
    ports: ['9090:9090']

  grafana:
    image: grafana/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - './grafana/provisioning:/etc/grafana/provisioning:ro'
      - 'grafana-data:/var/lib/grafana'
    ports: ['3001:3000'] # mapped to 3001 to avoid clashing with api :3000
    depends_on: [prometheus]

  api:
    build: .
    command: ['node', 'dist/server.js']
    env_file: .env # loads JWT_SECRET, MAIL_FROM, LOG_LEVEL, PORT, etc.
    environment:
      # override only what differs inside the compose network (.env uses localhost)
      NODE_ENV: production
      DATABASE_URL: postgres://app:app@postgres:5432/orders
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      SMTP_HOST: mailpit
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports: ['3000:3000']
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  email-worker:
    build: .
    command: ['node', 'dist/workers/email-worker.js']
    env_file: .env
    environment:
      # override only what differs inside the compose network (.env uses localhost)
      NODE_ENV: production
      DATABASE_URL: postgres://app:app@postgres:5432/orders
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      SMTP_HOST: mailpit
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
  grafana-data:
  rabbitmq-data:
  prometheus-data:
