# BASE — environment-neutral definitions shared by every environment.
# Never run this file alone; it is always combined with an environment overlay:
#   Local:  docker compose up -d
#           (docker-compose.override.yml is auto-merged → ports, mailpit, dev conveniences)
#   Prod:   docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Secrets policy (senior):
#   - NO credential is hard-coded. Infra creds (postgres/rabbitmq/grafana) are guarded with `${VAR:?}`
#     on the service that owns them — the app's env schema can't see those, so compose fails `up` early.
#   - The api/worker connection URLs use plain `${VAR}` (no `:?`): the parts are already required above,
#     and the app's @fastify/env schema validates DATABASE_URL / RABBITMQ_URL / JWT_SECRET at boot.
#   - Local values live in `.env` (auto-read by compose); prod values in `.env.prod` (via --env-file).
#   - Connection URLs are ASSEMBLED from the discrete cred vars here → one source of truth, no drift.
#
# Host port publishing and the dev-only mailpit live in docker-compose.override.yml, so the prod
# stack (which does not load the override) exposes nothing on the host except the API.

services:
  postgres:
    image: postgres:18.3
    environment:
      # left = keys the image requires; values come from our DATABASE_* vars
      POSTGRES_USER: ${DATABASE_USER:?}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?}
      POSTGRES_DB: ${DATABASE_NAME:?}
    volumes: ['pgdata:/var/lib/postgresql'] # pg18+ stores data in a versioned subdir here (not /data)
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}']
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.2.5-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?}
    volumes: ['rabbitmq-data:/var/lib/rabbitmq']
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    tmpfs: ['/tmp']

  prometheus:
    image: prom/prometheus:v3.12.0
    volumes:
      - './prometheus.yml:/etc/prometheus/prometheus.yml:ro'
      - 'prometheus-data:/prometheus'

  grafana:
    image: grafana/grafana:13.0.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?}
    volumes:
      - './grafana/provisioning:/etc/grafana/provisioning:ro'
      - 'grafana-data:/var/lib/grafana'
    depends_on: [prometheus]

  api:
    build: .
    command: ['node', '--import', './dist/infra/telemetry/otel.js', 'dist/server.js']
    environment:
      # The container always runs the compiled prod build; secrets (JWT_SECRET, MAIL_FROM, SMTP_*)
      # come from the env_file set by each overlay (.env locally, .env.prod in prod).
      NODE_ENV: production
      DATABASE_URL: postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: order-api
    ports: ['3000:3000']
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  email-worker:
    build: .
    command: ['node', '--import', './dist/infra/telemetry/otel.js', 'dist/workers/email-worker.js']
    # The shared image bakes an HTTP /health probe for the API; the worker has no HTTP server, so disable it.
    healthcheck:
      disable: true
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: email-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
  grafana-data:
  rabbitmq-data:
  prometheus-data:
