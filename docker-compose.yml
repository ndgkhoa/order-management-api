name: order-management

services:
  postgres:
    container_name: order-management-postgres
    image: postgres:18.4
    environment:
      POSTGRES_USER: ${DATABASE_USER:?}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?}
      POSTGRES_DB: ${DATABASE_NAME:?}
    volumes: ['pgdata:/var/lib/postgresql']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}']
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    container_name: order-management-rabbitmq
    image: rabbitmq:4.3.2-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?}
    volumes: ['rabbitmq-data:/var/lib/rabbitmq']
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    container_name: order-management-redis
    image: redis:8.8.0
    command: ['redis-server', '--appendonly', 'yes']
    volumes: ['redis-data:/data']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    container_name: order-management-jaeger
    image: jaegertracing/all-in-one:1.76.0
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    tmpfs: ['/tmp']

  prometheus:
    container_name: order-management-prometheus
    image: prom/prometheus:v3.12.0
    volumes:
      - './prometheus.yml:/etc/prometheus/prometheus.yml:ro'
      - 'prometheus-data:/prometheus'

  loki:
    container_name: order-management-loki
    image: grafana/loki:3.5.1
    command: ['-config.file=/etc/loki/loki-config.yml']
    volumes:
      - './loki/loki-config.yml:/etc/loki/loki-config.yml:ro'
      - 'loki-data:/loki'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3100/ready | grep -q ready']
      interval: 10s
      timeout: 5s
      retries: 10

  alloy:
    container_name: order-management-alloy
    image: grafana/alloy:v1.10.0
    user: root
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    volumes:
      - './alloy/config.alloy:/etc/alloy/config.alloy:ro'
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
    depends_on: [loki]

  grafana:
    container_name: order-management-grafana
    image: grafana/grafana:13.0.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?}
    volumes:
      - './grafana/provisioning:/etc/grafana/provisioning:ro'
      - 'grafana-data:/var/lib/grafana'
    depends_on: [prometheus, loki]

  api:
    container_name: order-management-api
    build: .
    command: ['node', '--import', './dist/infra/telemetry/otel.js', 'dist/server.js']
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: order-api
    ports: ['3000:3000']
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    container_name: order-management-worker
    build: .
    command: ['node', '--import', './dist/infra/telemetry/otel.js', 'dist/workers/worker.js']
    healthcheck:
      disable: true
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  grafana-data:
  rabbitmq-data:
  prometheus-data:
  loki-data:
  redis-data:
