# CodeQL — GitHub's static security analysis. Scans on PRs, on develop pushes, and weekly
# (a scheduled run catches newly-published query updates against unchanged code).
name: CodeQL

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  schedule:
    - cron: '23 5 * * 1' # Mondays 05:23 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write # upload results to the Security tab
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended # broader security coverage than the default pack

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
