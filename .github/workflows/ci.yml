# CI — verify every change: lint → typecheck → Testcontainers integration tests.
# Runs on every PR and on develop pushes. Image publishing lives in publish-image.yml
# (triggered after a green CI on develop) so PRs aren't cluttered with a skipped image job.
name: CI

on:
  push:
    branches: [develop]
  pull_request: {}

# Least privilege by default; the test job opts into pull-requests: write for its PR comment.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest # Docker is preinstalled → Testcontainers (pg/rabbit/mailpit) works.
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write # post the coverage/CI summary comment on PRs
    env:
      # Mapped to env so steps can guard on its presence (secrets can't be used in `if:`).
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (Vitest + Testcontainers, with coverage)
        id: test
        run: npm run test:cov

      # Parse the vitest json-summary into a markdown table for the PR comment.
      # `reportOnFailure` (vitest.config) means the summary exists even on a failed run.
      - name: Read coverage summary
        if: always()
        id: cov
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            {
              echo 'table<<COV_EOF'
              jq -r '.total | "| Metric | Coverage |\n| --- | --- |\n| Lines | \(.lines.pct)% (\(.lines.covered)/\(.lines.total)) |\n| Statements | \(.statements.pct)% |\n| Functions | \(.functions.pct)% |\n| Branches | \(.branches.pct)% |"' coverage/coverage-summary.json
              echo 'COV_EOF'
            } >> "$GITHUB_OUTPUT"
          else
            printf 'table<<COV_EOF\n_coverage report not generated_\nCOV_EOF\n' >> "$GITHUB_OUTPUT"
          fi

      # --- PR comment: one sticky comment (status + coverage + run link), updated in place ---
      - name: Comment CI summary on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true # fork PRs get a read-only token — never fail CI over a comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: ci-summary # identifies the sticky comment so it updates in place
          message: |
            ### ${{ steps.test.outcome == 'success' && '✅ CI passed' || '❌ CI failed' }} — lint · typecheck · tests

            **Coverage**

            ${{ steps.cov.outputs.table }}

            [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      # --- Slack: notify when a PR's checks (lint+typecheck+test) finish, pass OR fail ---
      - name: Notify Slack
        # always() → report failures too; skip if the webhook secret isn't configured.
        if: always() && github.event_name == 'pull_request' && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} CI ${{ job.status }} — PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}\nBy ${{ github.actor }} on `${{ github.head_ref }}`\nPR: ${{ github.event.pull_request.html_url }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
