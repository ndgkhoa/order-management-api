# Publish the dev image to GHCR — runs ONLY after CI succeeds on develop (workflow_run trigger).
# Kept out of ci.yml so pull requests aren't cluttered with a skipped image job. Versioned
# :X.Y.Z / :latest images are built by release-please.yml when a release is cut.
name: Publish image

on:
  workflow_run:
    workflows: [CI] # must match `name:` in ci.yml
    types: [completed]
    branches: [develop]

permissions:
  contents: read

concurrency:
  group: publish-image
  cancel-in-progress: true

jobs:
  image:
    name: Build & push dev image (GHCR)
    # Only when that CI run actually passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write # push to GHCR
    steps:
      # Build the exact commit CI tested (the run's head_sha), not develop's current tip.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # :develop tracks the branch head; :sha-<short> is immutable for precise rollbacks.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:develop
            ghcr.io/${{ github.repository }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
