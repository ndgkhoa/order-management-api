# Release automation. release-please reads conventional commits on develop and maintains a
# "release PR" that bumps the version + CHANGELOG. Merging that PR creates the GitHub Release + tag.
# When a release is cut, we build the VERSIONED image (:X.Y.Z + :latest) here — a tag created by
# GITHUB_TOKEN does NOT retrigger ci.yml, so the build must run in this same workflow run.
name: Release

on:
  push:
    branches: [develop]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel a release mid-flight

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create releases/tags
      pull-requests: write # open/maintain the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # Config + manifest live in the repo root (release-please-config.json,
          # .release-please-manifest.json) — manifest mode, release-type: node.
          token: ${{ secrets.GITHUB_TOKEN }}

  image:
    name: Build & push release image (GHCR + Docker Hub)
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      # Check out the exact release tag so the image content matches the version.
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # tag v1.2.3 → :1.2.3, :1.2 and :latest, plus immutable :sha-<short>.
      # One build, pushed to BOTH registries (GHCR + Docker Hub) with identical tags.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/order-management-api
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Each build pushes an untagged provenance/orphan manifest — prune them so the package
      # stays clean. NEVER touches tagged versions (releases, :latest, :sha-…).
      - name: Prune untagged image versions
        continue-on-error: true # cleanup must never fail the release
        uses: actions/delete-package-versions@v5
        with:
          package-name: order-management-api
          package-type: container
          delete-only-untagged-versions: true
