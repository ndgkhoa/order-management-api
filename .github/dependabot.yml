# Dependabot — automated weekly update PRs. Conventional-commit prefixes so release-please
# classifies them correctly (chore: deps → no release; npm prod-dep bumps stay reviewable).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: 'ci'
    groups:
      actions:
        patterns: ['*'] # one PR for all action bumps

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
    groups:
      dev-dependencies:
        dependency-type: development
        patterns: ['*']
