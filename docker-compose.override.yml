services:
  postgres:
    ports: ['5432:5432']

  rabbitmq:
    ports: ['5672:5672', '15672:15672']

  redis:
    ports: ['6379:6379']

  jaeger:
    ports: ['16686:16686', '4318:4318']

  prometheus:
    ports: ['9090:9090']

  loki:
    ports: ['3100:3100']

  alloy:
    ports: ['12345:12345']

  grafana:
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports: ['3001:3000']

  mailpit:
    container_name: order-management-mailpit
    image: axllent/mailpit:v1.30.1
    ports: ['1025:1025', '8025:8025']

  api:
    env_file: .env
    environment:
      SMTP_HOST: mailpit

  worker:
    env_file: .env
    environment:
      SMTP_HOST: mailpit
      PAYMENT_WEBHOOK_URL: ${PAYMENT_WEBHOOK_URL:-http://api:3000/webhooks/payment}
